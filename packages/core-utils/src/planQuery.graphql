query Plan(
  $transitFilter: [TransitFilterInput!]
  $bikeReluctance: Reluctance
  $carReluctance: Reluctance
  $dateTime: PlanDateTimeInput
  $origin: PlanLabeledLocationInput!
  $modes: PlanModesInput
  $numItineraries: Int
  $includeRealTimeCancellations: Boolean
  $destination: PlanLabeledLocationInput!
  $walkReluctance: Reluctance
  $walkSpeed: Speed
  $wheelchair: Boolean
) {
  planConnection(
    dateTime: $dateTime
    destination: $destination
    first: $numItineraries
    # Currently only supporting EN locale, used for times and text
    locale: "en"
    modes: $modes
    origin: $origin
    preferences: {accessibility: {wheelchair: {enabled: $wheelchair}}, street: {bicycle: {reluctance: $bikeReluctance}, car: {reluctance: $carReluctance}, walk: {speed: $walkSpeed, reluctance: $walkReluctance}}, transit: {filters: $transitFilter, timetable: {includeRealTimeCancellations: $includeRealTimeCancellations}}}
  ) {
    edges{
    node {
      accessibilityScore
      duration
      endTime
      legs {
        accessibilityScore
        agency {
          alerts {
            alertDescriptionText
            alertHeaderText
            alertUrl
            effectiveStartDate
            id
          }
          gtfsId
          id: gtfsId
          name
          timezone
          url
        }
        alerts {
          alertDescriptionText
          alertHeaderText
          alertUrl
          effectiveStartDate
          id
        }
        arrivalDelay
        departureDelay
        distance
        dropOffBookingInfo {
          contactInfo {
            bookingUrl
            infoUrl
            phoneNumber
          }
          earliestBookingTime {
            daysPrior
            time
          }
          latestBookingTime {
            daysPrior
            time
          }
          message
        }
        dropoffType
        duration
        endTime
        fareProducts {
          id
          product {
            __typename
            id
            medium {
              id
              name
            }
            name
            riderCategory {
              id
              name
            }
            ... on DefaultFareProduct {
              price {
                amount
                currency {
                  code
                  digits
                }
              }
            }
            ... on DependentFareProduct {
              dependencies {
                id
              }
              price {
                amount
                currency {
                  code
                }
              }
            }
          }
        }
        from {
          lat
          lon
          name
          rentalVehicle {
            id
            network
          }
          stop {
            alerts {
              alertDescriptionText
              alertHeaderText
              alertUrl
              effectiveStartDate
              id
            }
            code
            gtfsId
            id
            lat
            lon
          }
          vertexType
        }
        headsign
        id
        interlineWithPreviousLeg
        intermediateStops {
          lat
          locationType
          lon
          name
          stopCode: code
          stopId: id
        }
        legGeometry {
          length
          points
        }
        mode
        pickupBookingInfo {
          contactInfo {
            bookingUrl
            infoUrl
            phoneNumber
          }
          earliestBookingTime {
            daysPrior
            time
          }
          latestBookingTime {
            daysPrior
            time
          }
          message
        }
        pickupType
        realTime
        realtimeState
        rentedBike
        rideHailingEstimate {
          arrival
          maxPrice {
            amount
            currency {
              code
            }
          }
          minPrice {
            amount
            currency {
              code
            }
          }
          provider {
            id
          }
        }
        route {
          alerts {
            alertDescriptionText
            alertHeaderText
            alertUrl
            effectiveStartDate
            id
          }
          color
          gtfsId
          id: gtfsId
          longName
          shortName
          textColor
          type
        }
        startTime
        steps {
          absoluteDirection
          alerts {
            alertDescriptionText
            alertHeaderText
            alertUrl
            effectiveStartDate
            id
          }
          area
          distance
          elevationProfile {
            distance
            elevation
          }
          lat
          lon
          relativeDirection
          stayOn
          streetName
        }
        stopCalls {
          stopLocation {
            __typename
          }
        }
        to {
          lat
          lon
          name
          rentalVehicle {
            id
            network
          }
          stop {
            alerts {
              alertDescriptionText
              alertHeaderText
              alertUrl
              effectiveStartDate
              id
            }
            code
            gtfsId
            id
            lat
            lon
          }
          vertexType
        }
        transitLeg
        trip {
          arrivalStoptime {
            stop {
              gtfsId
              id
            }
            stopPosition
          }
          blockId
          departureStoptime {
            stop {
              gtfsId
              id
            }
            stopPosition
          }
          gtfsId
          id
        }
      }
      startTime
      transfers: numberOfTransfers
      waitingTime
      walkTime
    }
  }
    routingErrors {
      code
      description
      inputField
    }
}}
